<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── API key management (only used for the optional in-page "Ask" feature) ──
function getApiKey() { return localStorage.getItem("wc-api-key") || ""; }
function setApiKey(k) { localStorage.setItem("wc-api-key", k); }

// ── Helpers ──────────────────────────────────────────────────────────────────
function todayISO() { return new Date().toISOString().slice(0, 10); }
function formatDateLong(iso) {
  return new Date(iso + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
}
function confidenceTier(pct) {
  if (pct >= 70) return { fg: "#7fd99a" };
  if (pct >= 40) return { fg: "#e8c468" };
  return { fg: "#e8896a" };
}

// ── Components ───────────────────────────────────────────────────────────────
function ConfidenceMeter({ label, pct }) {
  const { fg } = confidenceTier(pct);
  return (
    <div className="meter">
      <div className="meter-label-row">
        <span className="meter-label">{label}</span>
        <span className="meter-pct" style={{ color: fg }}>{pct}%</span>
      </div>
      <div className="meter-track">
        <div className="meter-fill" style={{ width: `${pct}%`, background: fg }} />
      </div>
    </div>
  );
}

function ScoreSlip({ match }) {
  return (
    <div className="slip">
      <div className="slip-row">
        <span className="slip-team">{match.home.name}</span>
        <span className="slip-score">{match.prediction.home}</span>
      </div>
      <div className="slip-row">
        <span className="slip-team">{match.away.name}</span>
        <span className="slip-score">{match.prediction.away}</span>
      </div>
      <div className="meters">
        <ConfidenceMeter label="Winner" pct={match.winnerConfidence} />
        <ConfidenceMeter label="Exact score" pct={match.scoreConfidence} />
      </div>
      {match.confidenceNote && <p className="confidence-note">{match.confidenceNote}</p>}
    </div>
  );
}

function buildMatchContext(match) {
  const lines = [
    `Match: ${match.home.name} vs ${match.away.name} (${match.round}, ${match.kickoff}, ${match.venue})`,
    `${match.home.name} form: ${match.homeForm}`,
    `${match.away.name} form: ${match.awayForm}`,
    `Predicted: ${match.home.name} ${match.prediction.home}-${match.prediction.away} ${match.away.name}`,
    `Winner confidence: ${match.winnerConfidence}%. Score confidence: ${match.scoreConfidence}%.`,
    match.confidenceNote ? `Confidence note: ${match.confidenceNote}` : "",
    "Analysis:"
  ];
  match.analysis.forEach(b => lines.push(`- ${b.heading}: ${b.body}`));
  if (match.result) lines.push(`ACTUAL RESULT: ${match.home.name} ${match.result.home}-${match.result.away} ${match.away.name}.${match.result.note ? " " + match.result.note : ""}`);
  if (match.verdict) lines.push(`Verdict: ${match.verdict.outcome}. ${match.verdict.writeup || ""}`);
  return lines.filter(Boolean).join("\n");
}

function MatchChat({ match, apiKey }) {
  const [open, setOpen] = useState(false);
  const [question, setQuestion] = useState("");
  const [thread, setThread] = useState([]);
  const [asking, setAsking] = useState(false);
  const [err, setErr] = useState(null);
  const bottomRef = useRef(null);

  useEffect(() => { if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" }); }, [thread, asking]);

  async function ask(e) {
    e.preventDefault();
    const q = question.trim();
    if (!q || asking) return;
    if (!apiKey) { setErr("Add your Anthropic API key at the top of the page to use this feature."); return; }
    setErr(null);
    setQuestion("");
    const nextThread = [...thread, { role: "user", text: q }];
    setThread(nextThread);
    setAsking(true);
    try {
      const system = `You are the analyst behind a World Cup prediction column called "The Match Sheet." Answer the reader's question about this specific prediction directly — reference the actual reasoning, players, and numbers. Keep answers to 2-4 sentences unless more is genuinely needed. Plain prose only, no markdown headers.\n\n--- MATCH DATA ---\n${buildMatchContext(match)}`;
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, system, messages: nextThread.map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.text })) })
      });
      if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error?.message || `API error ${res.status}`); }
      const data = await res.json();
      const text = (data.content || []).find(b => b.type === "text")?.text || "No answer returned.";
      setThread(t => [...t, { role: "assistant", text }]);
    } catch (e2) {
      setErr(e2.message || "Couldn't reach the analyst — try again.");
      setThread(t => t.slice(0, -1));
      setQuestion(q);
    } finally { setAsking(false); }
  }

  if (!open) return <button className="ask-toggle" onClick={() => setOpen(true)}>Ask about this prediction →</button>;

  return (
    <div className="ask-box">
      <div className="ask-head">
        <span>Ask about {match.home.name} vs {match.away.name}</span>
        <button className="ask-close" onClick={() => setOpen(false)}>×</button>
      </div>
      {thread.length > 0 && (
        <div className="ask-thread">
          {thread.map((m, i) => (
            <div key={i} className={`ask-msg ask-msg-${m.role}`}>
              <span className="ask-msg-label">{m.role === "user" ? "You" : "Analyst"}</span>
              <p>{m.text}</p>
            </div>
          ))}
          {asking && <div className="ask-msg ask-msg-assistant"><span className="ask-msg-label">Analyst</span><p className="ask-thinking">Thinking…</p></div>}
          <div ref={bottomRef} />
        </div>
      )}
      {err && <p className="ask-error">{err}</p>}
      <form className="ask-form" onSubmit={ask}>
        <input type="text" value={question} onChange={e => setQuestion(e.target.value)} placeholder="e.g. Why isn't your score confidence higher?" disabled={asking} />
        <button type="submit" disabled={asking || !question.trim()}>Ask</button>
      </form>
    </div>
  );
}

function ResultStrip({ match }) {
  const { result, verdict } = match;
  const styles = { correct: { bg: "#1a3d2e", fg: "#7fd99a", label: "CALLED IT" }, close: { bg: "#3d3214", fg: "#e8c468", label: "CLOSE" }, wrong: { bg: "#3d1f1a", fg: "#e8896a", label: "MISSED" } };
  const s = styles[verdict?.outcome] || styles.wrong;
  return (
    <div className="result-strip">
      <div className="result-head">
        <span className="result-badge" style={{ background: s.bg, color: s.fg }}>{s.label}</span>
        <span className="result-score">Final: {match.home.name} {result.home}–{result.away} {match.away.name} <span className="predicted-was">(predicted {match.prediction.home}-{match.prediction.away})</span></span>
      </div>
      {verdict?.writeup && <p className="result-writeup">{verdict.writeup}</p>}
      {result.note && <p className="result-note">{result.note}</p>}
    </div>
  );
}

function MatchCard({ match, apiKey }) {
  return (
    <article className="match">
      <header className="match-head">
        <div className="match-meta">
          <span className="round-tag">{match.round}</span>
          <span className="dot">·</span><span>{match.kickoff}</span>
          <span className="dot">·</span><span>{match.venue}</span>
        </div>
        <h2 className="match-title">
          <span className="crest">{match.home.code}</span>
          {match.home.name}
          <span className="vs">vs</span>
          {match.away.name}
          <span className="crest">{match.away.code}</span>
        </h2>
        <div className="form-line">
          <span><strong>{match.home.name}:</strong> {match.homeForm}</span>
          <span><strong>{match.away.name}:</strong> {match.awayForm}</span>
        </div>
      </header>
      <div className="match-body">
        <div className="analysis">
          {match.analysis.map((b, i) => (
            <div className="analysis-block" key={i}>
              <h3>{b.heading}</h3>
              <p>{b.body}</p>
            </div>
          ))}
        </div>
        <ScoreSlip match={match} />
      </div>
      {match.result && <ResultStrip match={match} />}
      <MatchChat match={match} apiKey={apiKey} />
    </article>
  );
}

function DaySection({ entry, apiKey }) {
  const isToday = entry.date === todayISO();
  return (
    <section className="day">
      <div className="day-head">
        <h2>{formatDateLong(entry.date)}</h2>
        {isToday && <span className="today-flag">Today's slate</span>}
      </div>
      {entry.matches.map(m => <MatchCard key={m.id} match={m} apiKey={apiKey} />)}
    </section>
  );
}

function BankRow({ match, apiKey }) {
  const graded = !!match.result;
  const styles = { correct: { bg: "#1a3d2e", fg: "#7fd99a", label: "CALLED IT" }, close: { bg: "#3d3214", fg: "#e8c468", label: "CLOSE" }, wrong: { bg: "#3d1f1a", fg: "#e8896a", label: "MISSED" } };
  const s = graded ? (styles[match.verdict?.outcome] || styles.wrong) : null;
  return (
    <div className="bank-row">
      <div className="bank-row-top">
        <span className="bank-date">{formatDateLong(match.date)}</span>
        {graded ? <span className="bank-badge" style={{ background: s.bg, color: s.fg }}>{s.label}</span> : <span className="bank-badge bank-badge-pending">PENDING</span>}
      </div>
      <div className="bank-row-main">
        <span className="bank-teams">{match.home.name} vs {match.away.name}</span>
        <span className="bank-scores">Predicted {match.prediction.home}-{match.prediction.away}{graded ? ` → Actual ${match.result.home}-${match.result.away}` : ""}</span>
      </div>
      <div className="bank-row-conf">
        <span>Winner confidence: <strong>{match.winnerConfidence}%</strong></span>
        <span>Score confidence: <strong>{match.scoreConfidence}%</strong></span>
      </div>
      {graded && match.verdict?.writeup && <p className="bank-writeup">{match.verdict.writeup}</p>}
      <MatchChat match={match} apiKey={apiKey} />
    </div>
  );
}

function BankView({ entries, apiKey }) {
  const flat = entries.flatMap(e => e.matches.map(m => ({ ...m, date: e.date })));
  const graded = flat.filter(m => m.result);
  const correct = graded.filter(m => m.verdict?.outcome === "correct").length;
  const close = graded.filter(m => m.verdict?.outcome === "close").length;
  const wrong = graded.filter(m => m.verdict?.outcome === "wrong").length;
  const exactScores = graded.filter(m => m.result.home === m.prediction.home && m.result.away === m.prediction.away).length;
  const winnersRight = graded.filter(m => {
    const po = m.prediction.home > m.prediction.away ? "h" : m.prediction.home < m.prediction.away ? "a" : "d";
    const ao = m.result.home > m.result.away ? "h" : m.result.home < m.result.away ? "a" : "d";
    return po === ao;
  }).length;
  const sorted = [...flat].sort((a, b) => a.date < b.date ? 1 : -1);
  return (
    <div className="bank">
      <div className="bank-stats">
        <div className="stat"><span className="stat-num">{graded.length ? Math.round(winnersRight / graded.length * 100) : 0}%</span><span className="stat-label">Winner called right</span></div>
        <div className="stat"><span className="stat-num">{graded.length ? Math.round(exactScores / graded.length * 100) : 0}%</span><span className="stat-label">Exact score hit</span></div>
        <div className="stat"><span className="stat-num">{correct}-{close}-{wrong}</span><span className="stat-label">Called it / close / missed</span></div>
        <div className="stat"><span className="stat-num">{graded.length}</span><span className="stat-label">Graded predictions</span></div>
      </div>
      {flat.length === 0 ? <p className="bank-empty">No predictions logged yet.</p> : sorted.map(m => <BankRow key={m.id} match={m} apiKey={apiKey} />)}
    </div>
  );
}

function ApiKeyBanner({ apiKey, onSave }) {
  const [val, setVal] = useState(apiKey);
  const [saved, setSaved] = useState(false);
  function save(e) {
    e.preventDefault();
    onSave(val.trim());
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }
  return (
    <div className="api-banner">
      <span className="api-label">Anthropic API key for Ask feature:</span>
      <form className="api-form" onSubmit={save}>
        <input type="password" value={val} onChange={e => setVal(e.target.value)} placeholder="sk-ant-…" spellCheck={false} />
        <button type="submit">{saved ? "Saved ✓" : "Save"}</button>
      </form>
      <a className="api-link" href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">Get a key →</a>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("sheet");
  const [apiKey, setApiKeyState] = useState(getApiKey);
  const log = window.MATCH_SHEET_LOG || { entries: [] };

  function saveApiKey(k) { setApiKey(k); setApiKeyState(k); }

  const entries = [...log.entries].sort((a, b) => a.date < b.date ? 1 : -1);

  return (
    <div className="page">
      <Styles />
      <header className="masthead">
        <div className="masthead-inner">
          <p className="kicker">THE MATCH SHEET</p>
          <h1>World Cup 2026, Predicted Daily</h1>
          <p className="sub">Every matchday gets a full breakdown and a locked-in score before kickoff. Every result gets graded the next day — no quiet edits, no deleted misses. Updates automatically every morning.</p>
        </div>
      </header>

      <ApiKeyBanner apiKey={apiKey} onSave={saveApiKey} />

      <nav className="tabs">
        <div className="tabs-inner">
          <button className={`tab ${tab === "sheet" ? "tab-active" : ""}`} onClick={() => setTab("sheet")}>Match Sheet</button>
          <button className={`tab ${tab === "bank" ? "tab-active" : ""}`} onClick={() => setTab("bank")}>Prediction Bank</button>
        </div>
      </nav>

      <main className="content">
        {entries.length === 0 ? (
          <p className="bank-empty">No predictions logged yet — check back after the next scheduled update.</p>
        ) : tab === "sheet"
          ? entries.map(e => <DaySection key={e.date} entry={e} apiKey={apiKey} />)
          : <BankView entries={entries} apiKey={apiKey} />}
      </main>

      <footer className="page-footer">
        <p>This page rebuilds itself automatically every morning via GitHub Actions — no manual updates needed. Use the Prediction Bank to see the full track record, and "Ask about this prediction" on any match to question the reasoning directly.</p>
      </footer>
    </div>
  );
}
